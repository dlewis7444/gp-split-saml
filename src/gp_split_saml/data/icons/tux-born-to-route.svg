<?xml version="1.0" encoding="UTF-8"?>
<!-- Classic Tux mascot, hand-drawn SVG. Based on Larry Ewing's original. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 72" width="64" height="64">

  <!-- Left foot -->
  <ellipse cx="23" cy="66" rx="8" ry="3.5" fill="#E8A000" transform="rotate(-8 23 66)"/>
  <!-- Right foot -->
  <ellipse cx="41" cy="66" rx="8" ry="3.5" fill="#E8A000" transform="rotate(8 41 66)"/>

  <!-- Body — black pear shape -->
  <ellipse cx="32" cy="45" rx="17" ry="20" fill="#1C1C1C"/>

  <!-- Head — black circle -->
  <circle cx="32" cy="17" r="13" fill="#1C1C1C"/>

  <!-- Left flipper -->
  <path d="M15 30 Q8 38 10 50 Q14 44 17 35 Z" fill="#1C1C1C"/>
  <!-- Right flipper -->
  <path d="M49 30 Q56 38 54 50 Q50 44 47 35 Z" fill="#1C1C1C"/>

  <!-- White belly -->
  <ellipse cx="32" cy="48" rx="11" ry="15" fill="#F0EDD8"/>

  <!-- Left eye white -->
  <ellipse cx="26.5" cy="15" rx="5" ry="5.5" fill="white"/>
  <!-- Right eye white -->
  <ellipse cx="37.5" cy="15" rx="5" ry="5.5" fill="white"/>

  <!-- Left pupil -->
  <ellipse cx="28" cy="15.5" rx="2.5" ry="3" fill="#111"/>
  <!-- Right pupil -->
  <ellipse cx="39" cy="15.5" rx="2.5" ry="3" fill="#111"/>

  <!-- Eye glints -->
  <circle cx="29" cy="14" r="1" fill="white"/>
  <circle cx="40" cy="14" r="1" fill="white"/>

  <!-- Beak upper -->
  <path d="M27.5 22 Q32 19.5 36.5 22 Q34 24.5 32 25.5 Q30 24.5 27.5 22 Z" fill="#E8A000"/>
  <!-- Beak lower (slightly darker) -->
  <path d="M27.5 22 Q30 24.5 32 25.5 Q34 24.5 36.5 22 Q34 26.5 32 28 Q30 26.5 27.5 22 Z" fill="#C87800"/>

  <!-- Network routing diamond on belly (teal accent) -->
  <path d="M28.5 48 L32 44.5 L35.5 48 L32 51.5 Z"
        fill="none" stroke="#00D4AA" stroke-width="1.2" opacity="0.85"/>
  <circle cx="32" cy="48" r="1.6" fill="#00D4AA" opacity="0.85"/>

</svg>
