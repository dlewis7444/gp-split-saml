<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Tux body -->
  <ellipse cx="32" cy="40" rx="18" ry="20" fill="#2C2C2C"/>
  <!-- Belly -->
  <ellipse cx="32" cy="42" rx="12" ry="15" fill="#F5F5DC"/>
  <!-- Head -->
  <circle cx="32" cy="18" r="12" fill="#2C2C2C"/>
  <!-- Eyes -->
  <ellipse cx="27" cy="16" rx="3.5" ry="4" fill="white"/>
  <ellipse cx="37" cy="16" rx="3.5" ry="4" fill="white"/>
  <circle cx="28" cy="16" r="2" fill="#1A1A2E"/>
  <circle cx="38" cy="16" r="2" fill="#1A1A2E"/>
  <!-- Eye glints -->
  <circle cx="29" cy="15" r="0.8" fill="white"/>
  <circle cx="39" cy="15" r="0.8" fill="white"/>
  <!-- Beak -->
  <ellipse cx="32" cy="22" rx="5" ry="2.5" fill="#FF6B35"/>
  <!-- Feet -->
  <ellipse cx="24" cy="59" rx="7" ry="3" fill="#FF6B35"/>
  <ellipse cx="40" cy="59" rx="7" ry="3" fill="#FF6B35"/>
  <!-- Flippers -->
  <ellipse cx="13" cy="38" rx="4" ry="10" fill="#2C2C2C" transform="rotate(-15 13 38)"/>
  <ellipse cx="51" cy="38" rx="4" ry="10" fill="#2C2C2C" transform="rotate(15 51 38)"/>
  <!-- Network cable / route symbol on belly -->
  <path d="M26 38 L32 34 L38 38 L32 42 Z" fill="none" stroke="#00D4AA" stroke-width="1.5"/>
  <circle cx="32" cy="38" r="2" fill="#00D4AA"/>
  <line x1="26" y1="38" x2="22" y2="38" stroke="#00D4AA" stroke-width="1.2"/>
  <line x1="38" y1="38" x2="42" y2="38" stroke="#00D4AA" stroke-width="1.2"/>
  <line x1="32" y1="34" x2="32" y2="30" stroke="#00D4AA" stroke-width="1.2"/>
  <line x1="32" y1="42" x2="32" y2="46" stroke="#00D4AA" stroke-width="1.2"/>
</svg>
